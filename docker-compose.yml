version: '3.8'

services:
  stats-db:
    image: postgres:16.1
    environment:
      POSTGRES_DB: stats
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: stats
    ports:
      - "5433:5432"
    volumes:
      - stats_data:/var/lib/postgresql/data

  stats-server:
    build: ./ewm-stats/stats-server
    depends_on:
      - stats-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://stats-db:5432/stats
      SPRING_DATASOURCE_USERNAME: stats
      SPRING_DATASOURCE_PASSWORD: stats
    ports:
      - "9090:9090"

  ewm-main:
    build: ./ewm-main
    depends_on:
      - stats-server
    ports:
      - "8080:8080"

volumes:
  stats_data:
