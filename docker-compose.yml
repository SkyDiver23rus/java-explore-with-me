services:
  stats-db:
    image: postgres:15.1-alpine
    container_name: ewm-stats-db
    ports:
      - "6541:5432"
    environment:
      - POSTGRES_DB=stats
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: pg_isready -q -d stats -U postgres
      timeout: 5s
      interval: 10s
      retries: 5
    volumes:
      - stats-db-data:/var/lib/postgresql/data

  stats-server:
    build: ./ewm-stats/stats-server
    container_name: ewm-stats-server
    depends_on:
      stats-db:
        condition: service_healthy
    ports:
      - "9090:9090"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_NAME=stats
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - DB_HOST=stats-db
      - DB_PORT=5432
    volumes:
      - ./ewm-stats/stats-server/target:/app

  ewm-db:
    image: postgres:15.1-alpine
    container_name: ewm-main-db
    ports:
      - "6542:5432"
    environment:
      - POSTGRES_DB=ewm-main
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: pg_isready -q -d ewm-main -U postgres
      timeout: 5s
      interval: 10s
      retries: 5
    volumes:
      - ewm-db-data:/var/lib/postgresql/data

  ewm-main:
    build: ./ewm-main/main-server
    container_name: ewm-main-server
    depends_on:
      ewm-db:
        condition: service_healthy
      stats-server:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - STATS_CLIENT_URL=http://stats-server:9090
    volumes:
      - ./ewm-main/main-server/target:/app

volumes:
  stats-db-data:
  ewm-db-data: