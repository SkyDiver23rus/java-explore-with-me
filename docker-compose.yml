services:
  stats-db:
    image: postgres:16-alpine
    container_name: stats-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=stats
      - POSTGRES_USER=stats
      - POSTGRES_PASSWORD=stats
    healthcheck:
      test: pg_isready -q -d stats -U stats
      timeout: 5s
      interval: 5s
      retries: 10
    volumes:
      - stats-db-data:/var/lib/postgresql/data

  stats-server:
    build: ./ewm-stats/stats-server
    container_name: stats-server
    ports:
      - "9090:9090"
    depends_on:
      stats-db:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/stats
      - SPRING_DATASOURCE_USERNAME=stats
      - SPRING_DATASOURCE_PASSWORD=stats

  # Заглушка для ewm-service
  ewm-service:
    image: alpine:latest
    container_name: ewm-service
    command: ["sh", "-c", "echo 'EWM Service - will be implemented in stage 2'; sleep infinity"]
    ports:
      - "8080:8080"
    depends_on:
      - stats-server

  # Основной сервис
  main-server:
    build: ./ewm-main/main-server
    container_name: main-server
    ports:
      - "8081:8080"
    depends_on:
      - stats-server
    environment:
      - STATS_SERVER_URL=http://stats-server:9090

volumes:
  stats-db-data: